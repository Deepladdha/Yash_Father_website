<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - IKON Business Products & Solutions</title>
    <link rel="icon" href="img/IKON-Logo-2.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .contact-form-section { padding: 60px 20px; background: var(--off-white); min-height: 80vh; }
        .form-container { max-width: 800px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--blue); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-body); }
        .submit-btn { background: var(--blue); color: var(--white); border: none; padding: 14px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: background var(--transition); width: 100%; }
        .submit-btn:hover { background: var(--blue-mid); }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-brand">
                <img src="img/IKON-Logo-2.png" alt="IKON Logo">
                <span class="nav-brand-text">IKON <span>Business Products & Solutions</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#product-center-page">Products</a>
                <a href="index.html#contact-us-page" class="nav-cta">Back to Contact</a>
            </div>
        </nav>
    </header>

    <section class="contact-form-section">
        <div class="form-container">
            <h2 class="section-title text-center">Send Us a Message</h2>
            <p class="text-center" style="margin-bottom: 30px;">Fill out the form below and our team will get back to you shortly.</p>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="interest">Interested In</label>
                    <select id="interest" name="interest">
                        <option value="cnc-oscillating">CNC Oscillating Knife</option>
                        <option value="cnc-router">CNC Router</option>
                        <option value="multi-layer">Multi-Layer Cutting</option>
                        <option value="co2-laser">CO2 Laser</option>
                        <option value="fiber-laser">Fiber Laser</option>
                        <option value="spare-parts">Spare Parts</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Your Message *</label>
                    <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </section>

    <footer style="padding: 20px; text-align: center; background: var(--blue); color: white;">
        <p>&copy; 2025 IKON Business Products & Solutions. All Rights Reserved.</p>
    </footer>
</body>
</html>
